<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Report{% endblock %}</title>
  <style>
    body { font-family: "Helvetica Neue", Arial, sans-serif; color: #1a1a1a; margin: 2rem; line-height: 1.45; }
    h1 { color: #0b4f6c; border-bottom: 3px solid #0b4f6c; padding-bottom: .3rem; }
    h2 { color: #0b4f6c; margin-top: 1.6rem; border-bottom: 1px solid #d0d7de; padding-bottom: .2rem; }
    table { border-collapse: collapse; width: 100%; margin: .6rem 0 1.2rem; font-size: .9rem; }
    th, td { border: 1px solid #d0d7de; padding: .4rem .6rem; text-align: left; vertical-align: top; }
    th { background: #eef3f6; }
    .meta { background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; padding: .8rem 1rem; }
    .meta dt { font-weight: 600; color: #57606a; }
    .meta dd { margin: 0 0 .5rem; }
    .pill { display: inline-block; padding: .1rem .5rem; border-radius: 10px; font-size: .8rem; font-weight: 600; }
    .ok { background: #dafbe1; color: #1a7f37; }
    .warn { background: #fff8c5; color: #9a6700; }
    .bad { background: #ffebe9; color: #cf222e; }
    .muted { color: #6e7781; }
    footer { margin-top: 2.5rem; font-size: .8rem; color: #6e7781; border-top: 1px solid #d0d7de; padding-top: .6rem; }
    .kpi { display: inline-block; min-width: 7rem; margin: .3rem .6rem .3rem 0; padding: .6rem .8rem; background: #f6f8fa; border: 1px solid #d0d7de; border-radius: 6px; text-align: center; }
    .kpi .n { font-size: 1.4rem; font-weight: 700; color: #0b4f6c; }
    .kpi .l { font-size: .75rem; color: #57606a; text-transform: uppercase; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <footer>
    Generated by ISO 13485 Audit System v{{ system_version }} on {{ generated_at }}.
    This report is a generated work product and should be reviewed by a qualified auditor.
  </footer>
</body>
</html>
